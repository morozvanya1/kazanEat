<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Где едим завтра? 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --rose: #E8728A; --rose-light: #F5A8B8; --peach: #F5C5A3;
    --cream: #FFF5F0; --blush: #FCE8ED;
    --text-dark: #3D2530; --text-mid: #7A5060; --text-light: #B8909A;
    --card-bg: rgba(255,255,255,0.88);
    --shadow: 0 8px 32px rgba(232,114,138,0.18);
  }
  html, body { height: 100%; font-family: 'Nunito', sans-serif; background: var(--cream); color: var(--text-dark); overflow-x: hidden; }
  .bg-gradient { position: fixed; inset: 0; background: radial-gradient(ellipse at 20% 10%, rgba(245,197,163,0.55) 0%, transparent 55%), radial-gradient(ellipse at 85% 5%, rgba(248,180,200,0.45) 0%, transparent 45%), radial-gradient(ellipse at 60% 90%, rgba(232,114,138,0.25) 0%, transparent 50%), linear-gradient(160deg, #FFF0F5 0%, #FFF5EE 50%, #FFF0F8 100%); z-index: 0; }
  .petals { position: fixed; inset: 0; pointer-events: none; z-index: 1; overflow: hidden; }
  .petal { position: absolute; top: -40px; animation: fall linear infinite; opacity: 0.6; }
  @keyframes fall { 0% { transform: translateY(-40px) rotate(0deg); opacity: 0; } 10% { opacity: 0.6; } 90% { opacity: 0.4; } 100% { transform: translateY(110vh) rotate(540deg); opacity: 0; } }
  .app { position: relative; z-index: 2; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 0 16px 40px; }
  .header { text-align: center; padding: 48px 0 32px; animation: fadeUp 0.7s ease both; }
  .header-emoji { font-size: 48px; display: block; margin-bottom: 12px; animation: floatEmoji 3s ease-in-out infinite; }
  @keyframes floatEmoji { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
  .header h1 { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 600; color: var(--text-dark); line-height: 1.3; }
  .header p { margin-top: 8px; font-size: 14px; color: var(--text-light); font-weight: 300; letter-spacing: 0.3px; }
  .choices { width: 100%; max-width: 380px; display: flex; flex-direction: column; gap: 16px; animation: fadeUp 0.8s 0.15s ease both; }
  .choice-card { background: var(--card-bg); backdrop-filter: blur(12px); border-radius: 24px; padding: 24px 20px; border: 1.5px solid rgba(232,114,138,0.18); box-shadow: var(--shadow); cursor: pointer; display: flex; align-items: center; gap: 18px; transition: transform 0.22s ease, box-shadow 0.22s ease; user-select: none; }
  .choice-card:active { transform: scale(0.97); box-shadow: 0 4px 16px rgba(232,114,138,0.12); }
  .choice-icon { width: 64px; height: 64px; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 32px; flex-shrink: 0; }
  .choice-icon.restaurant { background: linear-gradient(135deg, #FFE0EC, #FFBBD0); }
  .choice-icon.home { background: linear-gradient(135deg, #FFE8D5, #FFCBA4); }
  .choice-text h2 { font-family: 'Playfair Display', serif; font-size: 19px; font-weight: 600; color: var(--text-dark); margin-bottom: 4px; }
  .choice-text p { font-size: 12.5px; color: var(--text-light); line-height: 1.45; }
  .choice-arrow { margin-left: auto; color: var(--rose-light); font-size: 20px; flex-shrink: 0; }
  .result-screen { display: none; width: 100%; max-width: 380px; flex-direction: column; gap: 0; animation: fadeUp 0.5s ease both; }
  .result-screen.visible { display: flex; }
  .back-btn { background: none; border: none; font-family: 'Nunito', sans-serif; font-size: 14px; color: var(--text-light); cursor: pointer; display: flex; align-items: center; gap: 6px; padding: 0 0 20px; transition: color 0.2s; }
  .back-btn:hover { color: var(--rose); }
  .result-card { background: var(--card-bg); backdrop-filter: blur(12px); border-radius: 24px; border: 1.5px solid rgba(232,114,138,0.18); box-shadow: var(--shadow); overflow: hidden; }
  .result-top { background: linear-gradient(135deg, #F7C5D5 0%, #F5BFA8 100%); padding: 28px 22px 22px; position: relative; }
  .result-type-label { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(61,37,48,0.55); font-weight: 600; margin-bottom: 8px; }
  .result-title { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 600; color: var(--text-dark); line-height: 1.3; }
  .result-subtitle { margin-top: 6px; font-size: 13px; color: var(--text-mid); }
  .result-deco { position: absolute; right: 18px; top: 18px; font-size: 42px; opacity: 0.35; }
  .result-body { padding: 22px; }
  .result-section { margin-bottom: 20px; }
  .result-section:last-child { margin-bottom: 0; }
  .result-section-title { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--rose); font-weight: 600; margin-bottom: 10px; }
  .result-section-body { font-size: 14px; color: var(--text-mid); line-height: 1.7; }
  .tag-list { display: flex; flex-wrap: wrap; gap: 8px; }
  .tag { background: var(--blush); color: var(--rose); font-size: 12px; font-weight: 600; padding: 5px 12px; border-radius: 20px; border: 1px solid rgba(232,114,138,0.2); }
  .rating-row { display: flex; align-items: center; gap: 8px; font-size: 14px; color: var(--text-mid); }
  .stars { color: #F5C34C; font-size: 16px; letter-spacing: 1px; }
  .ingredient-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
  .ingredient-list li { font-size: 14px; color: var(--text-mid); display: flex; align-items: flex-start; gap: 8px; line-height: 1.45; }
  .ingredient-list li::before { content: '🛒'; font-size: 13px; flex-shrink: 0; margin-top: 1px; }
  .steps-list { list-style: none; display: flex; flex-direction: column; gap: 12px; }
  .steps-list li { display: flex; gap: 12px; font-size: 14px; color: var(--text-mid); line-height: 1.55; }
  .step-num { flex-shrink: 0; width: 22px; height: 22px; border-radius: 50%; background: linear-gradient(135deg, var(--rose-light), var(--rose)); color: white; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; margin-top: 1px; }
  .shuffle-btn { width: 100%; margin-top: 16px; padding: 15px; border: none; border-radius: 16px; background: linear-gradient(135deg, #E8728A, #D4556D); color: white; font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; letter-spacing: 0.3px; transition: transform 0.18s, box-shadow 0.18s; box-shadow: 0 4px 18px rgba(232,114,138,0.4); }
  .shuffle-btn:active { transform: scale(0.97); }
  .divider { height: 1px; background: linear-gradient(to right, transparent, rgba(232,114,138,0.25), transparent); margin: 18px 0; }
  .address-row { display: flex; align-items: flex-start; gap: 8px; font-size: 13.5px; color: var(--text-mid); line-height: 1.5; }
  .address-pin { color: var(--rose); flex-shrink: 0; }
  .cuisine-badge { display: inline-block; background: linear-gradient(135deg, #FFE0EC, #FFCBA4); color: var(--text-dark); font-size: 12px; font-weight: 600; padding: 5px 14px; border-radius: 20px; margin-bottom: 12px; }
  .time-badge { display: inline-flex; align-items: center; gap: 5px; background: var(--blush); color: var(--text-mid); font-size: 12px; font-weight: 600; padding: 5px 12px; border-radius: 20px; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<div class="bg-gradient"></div>
<div class="petals" id="petals"></div>
<div class="app">
  <div class="header" id="header">
    <span class="header-emoji">🌸</span>
    <h1>Где едим завтра?</h1>
    <p>Казань · выбери, как хочется провести вечер</p>
  </div>
  <div class="choices" id="choiceScreen">
    <div class="choice-card" onclick="choose('restaurant')">
      <div class="choice-icon restaurant">🍽️</div>
      <div class="choice-text">
        <h2>Ресторан</h2>
        <p>Найдём уютное место в Казани с высоким рейтингом — случайно и неожиданно</p>
      </div>
      <div class="choice-arrow">›</div>
    </div>
    <div class="choice-card" onclick="choose('home')">
      <div class="choice-icon home">🍳</div>
      <div class="choice-text">
        <h2>Дома</h2>
        <p>Рецепт блюда из любой кухни мира — готовим за час на плите</p>
      </div>
      <div class="choice-arrow">›</div>
    </div>
  </div>
  <div class="result-screen" id="resultScreen">
    <button class="back-btn" onclick="goBack()">← вернуться</button>
    <div class="result-card" id="resultCard"></div>
    <button class="shuffle-btn" id="shuffleBtn" onclick="shuffle()">✨ Попробовать другой вариант</button>
  </div>
</div>

<script>
// ── PETALS ──
const PETALS = ['🌸','🌺','🌷','💮','🌼'];
const pc = document.getElementById('petals');
for (let i = 0; i < 14; i++) {
  const el = document.createElement('div');
  el.className = 'petal';
  el.textContent = PETALS[i % PETALS.length];
  el.style.left = (Math.random() * 100) + 'vw';
  el.style.fontSize = (12 + Math.random() * 12) + 'px';
  el.style.animationDuration = (8 + Math.random() * 12) + 's';
  el.style.animationDelay = (-Math.random() * 14) + 's';
  pc.appendChild(el);
}

const RECIPES = [
  { name:"Паста Карбонара", cuisine:"Итальянская кухня", time:"25 минут", emoji:"🍝", description:"Шелковистая паста с хрустящим беконом и нежным сливочным соусом из яиц и пармезана. Никаких сливок — только магия правильной техники.", ingredients:["Спагетти — 200 г","Гуанчале или бекон — 150 г","Яйца — 3 шт (2 желтка + 1 целое)","Пармезан тёртый — 80 г","Чёрный перец свежемолотый","Соль для воды"], steps:["Отвари спагетти в сильно подсоленной воде до аль денте, сохрани 1 стакан воды.","Нарежь бекон кубиками и обжарь на сухой сковороде до хруста, выключи огонь.","Взбей яйца с желтками, добавь пармезан и щедро поперчи.","Горячие спагетти добавь к бекону, влей пару ложек воды и вылей яичную смесь.","Быстро перемешивай, подливая воду — соус должен обволакивать пасту. Подавай немедленно."], tip:"Никогда не лей яичный соус в горячую сковороду: снимай с огня и добавляй яйца только к горячей пасте." },
  { name:"Тайский карри с кокосом", cuisine:"Тайская кухня", time:"35 минут", emoji:"🥥", description:"Ароматное кремовое карри с кокосовым молоком, куриным филе и свежими овощами. Нежный, но насыщенный вкус с лёгкой остротой.", ingredients:["Куриное филе — 400 г","Кокосовое молоко — 400 мл","Красная паста карри — 2 ст. л.","Болгарский перец — 1 шт","Стручковая фасоль — 150 г","Рыбный соус — 1 ст. л.","Сок лайма — 1 шт","Свежий базилик — пучок","Рис жасмин — 200 г"], steps:["Поставь вариться рис. Курицу нарежь кубиками, перец — полосками.","Разогрей вок, добавь 3 ст. л. кокосового молока и пасту карри — жарь 1 минуту.","Добавь курицу, обжаривай 5 минут. Влей оставшееся кокосовое молоко.","Добавь перец, фасоль, рыбный соус. Туши 10-12 минут.","Выжми лайм, подавай с рисом и листьями базилика."], tip:"Чем больше обжариваешь пасту карри в начале — тем ярче и насыщеннее аромат блюда." },
  { name:"Шакшука", cuisine:"Ближневосточная кухня", time:"25 минут", emoji:"🍳", description:"Нежные яйца, томлёные в пряном томатном соусе с паприкой и зирой. Простое, яркое и невероятно вкусное блюдо родом из Туниса.", ingredients:["Яйца — 4 шт","Томаты в собственном соку — 400 г","Болгарский перец — 2 шт","Лук — 1 шт","Чеснок — 3 зубчика","Паприка сладкая — 1 ч. л.","Зира молотая — 0.5 ч. л.","Оливковое масло, соль, перец","Петрушка и хлеб для подачи"], steps:["Лук и перец нарежь, чеснок — мелко. Обжаривай на масле 7 минут.","Добавь паприку и зиру, жарь 1 минуту. Влей томаты, разомни ложкой.","Туши соус 10 минут, посоли и поперчи.","Сделай 4 углубления ложкой и разбей яйца.","Накрой крышкой, готовь 5-7 минут. Подавай прямо в сковороде с хлебом."], tip:"Добавь в соус ложку сливочного масла и 50 г феты перед подачей — вкус станет нежнее и богаче." },
  { name:"Ризотто с грибами", cuisine:"Итальянская кухня", time:"45 минут", emoji:"🍄", description:"Кремовое, обволакивающее ризотто с ароматными лесными грибами и пармезаном. Медитативный процесс — и великолепный результат.", ingredients:["Рис арборио — 200 г","Шампиньоны или лесные грибы — 300 г","Горячий бульон — 800 мл","Белое сухое вино — 100 мл","Лук шалот — 2 шт","Чеснок — 2 зубчика","Пармезан тёртый — 60 г","Сливочное масло — 40 г","Оливковое масло, тимьян"], steps:["Грибы обжарь на сильном огне с тимьяном до золотистости. Отложи.","Обжарь шалот и чеснок на масле 3 минуты.","Добавь рис, мешай 2 минуты. Влей вино, дождись впитывания.","Добавляй горячий бульон по половнику, помешивая — 20 минут.","Сними с огня, добавь грибы, масло и пармезан. Подавай немедленно."], tip:"Бульон обязательно горячий — холодный остудит рис и нарушит кремовую текстуру ризотто." },
  { name:"Шакшука с фетой", cuisine:"Израильская кухня", time:"20 минут", emoji:"🧅", description:"Сливочная вариация шакшуки с рассыпчатой фетой и зелёным луком. Ещё нежнее, ещё сытнее, ещё прекраснее.", ingredients:["Яйца — 3 шт","Томаты черри — 300 г","Фета — 100 г","Лук зелёный — пучок","Чеснок — 2 зубчика","Хлопья чили — щепотка","Оливковое масло","Питта или багет"], steps:["Черри разрежь пополам, обжарь на масле с чесноком 5 минут.","Разомни часть томатов вилкой, добавь чили, посоли.","Раскроши фету поверх соуса.","Разбей яйца, накрой крышкой и готовь 4-5 минут.","Посыпь зелёным луком, подавай с горячей питтой."], tip:"Фета солёная — не добавляй соль до конца готовки, попробуй сначала." },
  { name:"Пад Тай с креветками", cuisine:"Тайская кухня", time:"30 минут", emoji:"🍤", description:"Культовая тайская лапша с хрустящими ростками, яйцом и тигровыми креветками в кисло-сладком соусе.", ingredients:["Рисовая лапша — 200 г","Тигровые креветки — 200 г","Яйца — 2 шт","Ростки маша — 100 г","Рыбный соус — 2 ст. л., соевый соус — 1 ст. л., сахар — 1 ст. л.","Зелёный лук — 3 стебля","Жареный арахис — 40 г","Лайм — 1 шт"], steps:["Замочи лапшу в горячей воде на 10 минут, откинь.","Обжарь креветки 2 минуты, отложи.","Добавь лапшу и соус — жарь 2 минуты в воке.","Сдвинь лапшу, разбей яйца и смешай с лапшой.","Добавь всё остальное, подавай с арахисом и долькой лайма."], tip:"Горячий вок и быстрые движения — главный секрет. Готовь на максимальном огне." },
  { name:"Хачапури по-аджарски", cuisine:"Грузинская кухня", time:"50 минут", emoji:"🧀", description:"Знаменитые грузинские лодочки с расплавленным сулугуни, маслом и яйцом. Самый уютный ужин из возможных.", ingredients:["Мука — 300 г","Молоко тёплое — 150 мл","Дрожжи сухие — 5 г","Сулугуни — 300 г","Яйца — 3 шт","Сливочное масло — 40 г","Сахар — 1 ч. л., соль — 0.5 ч. л."], steps:["Смешай молоко, дрожжи, сахар. Добавь муку, соль, яйцо — замеси тесто. Оставь на 25 минут.","Натри сулугуни, смешай с 20 г мягкого масла.","Тесто раздели, раскатай овалы. Сверни края, формируя лодочки, защипни концы.","Наполни сыром. Обжарь на сухой сковороде под крышкой 12 минут на минимальном огне.","Сделай углубление, вбей яйцо, верни на минуту. Добавь масло и подавай."], tip:"Настоящее хачапури едят руками: отламывают кусочек теста с края и макают в расплавленный сыр с желтком." },
  { name:"Суп Том Ям", cuisine:"Тайская кухня", time:"35 минут", emoji:"🍜", description:"Легендарный тайский суп: острый, кислый, ароматный. Кокосовое молоко делает его кремовым и незабываемым.", ingredients:["Тигровые креветки — 250 г","Кокосовое молоко — 200 мл","Куриный бульон — 600 мл","Шампиньоны — 150 г","Паста том-ям — 2 ст. л.","Рыбный соус — 2 ст. л.","Сок лайма — 2 ст. л.","Помидоры черри — 100 г","Кинза и перец чили"], steps:["Доведи бульон до кипения, добавь пасту том-ям.","Добавь шампиньоны и помидоры черри, вари 5 минут.","Влей кокосовое молоко, добавь рыбный соус и лайм.","Опусти креветки, вари ровно 3 минуты.","Подавай с кинзой и кольцами чили."], tip:"Паста том-ям уже содержит лемонграсс и галангал — не нужно искать эти ингредиенты отдельно." },
  { name:"Чахохбили из курицы", cuisine:"Грузинская кухня", time:"50 минут", emoji:"🍗", description:"Сочная курица в томатах с луком, грецкими орехами и пряными травами. Насыщенное грузинское тушёное мясо.", ingredients:["Курица кусочками — 1 кг","Помидоры — 500 г","Лук — 3 шт","Чеснок — 4 зубчика","Кинза — пучок","Хмели-сунели — 1 ч. л.","Аджика — 1 ч. л.","Сливочное масло — 30 г"], steps:["Кусочки курицы обжарь в сухой кастрюле без масла 10 минут.","Добавь нарезанный лук, жарь ещё 8 минут.","Добавь томаты, хмели-сунели, аджику. Туши под крышкой 25 минут.","Добавь чеснок за 5 минут до конца.","Добавь масло и кинзу, подавай с лавашем."], tip:"Жарка курицы без масла в начале — грузинский секрет: собственный жир птицы даёт особый вкус." },
  { name:"Домашний рамён", cuisine:"Японская кухня", time:"45 минут", emoji:"🍜", description:"Насыщенный рамён с мягко-варёным яйцом, шпинатом и свининой в ароматном бульоне соевого соуса.", ingredients:["Свинина (шея) — 300 г","Яичная лапша — 200 г","Яйца — 2 шт","Куриный бульон — 800 мл","Соевый соус — 3 ст. л.","Кунжутное масло — 1 ч. л.","Имбирь — 20 г, чеснок — 3 зубчика","Шпинат — 100 г","Зелёный лук, кунжут"], steps:["Яйца вари 6 минут, охлади, очисти. Разрежь пополам.","Свинину обжарь с имбирём и чесноком 5 минут.","Влей бульон и соевый соус, вари 20 минут.","Отвари лапшу отдельно, добавь шпинат в бульон на 2 минуты.","Разложи лапшу, залей бульоном, положи яйцо, посыпь луком и кунжутом."], tip:"Для идеального яйца — после варки замаринуй 30 минут в смеси соевого соуса, воды и сахара 3:2:1." },
  { name:"Спагетти Болоньезе", cuisine:"Итальянская кухня", time:"55 минут", emoji:"🍝", description:"Классический болоньезе с медленно тушёным мясным соусом, морковью и вином. Простой и абсолютно беспроигрышный.", ingredients:["Говяжий фарш — 400 г","Спагетти — 200 г","Томаты в собственном соку — 400 г","Лук — 1 шт, морковь — 1 шт, сельдерей — 1 стебель","Красное вино — 100 мл","Томатная паста — 1 ст. л.","Чеснок — 2 зубчика","Пармезан, тимьян, лавровый лист"], steps:["Лук, морковь, сельдерей нарежь, обжарь 8 минут.","Добавь фарш, жарь 7-8 минут до коричневого цвета.","Влей вино, выпари 3 минуты. Добавь томатную пасту и специи.","Добавь томаты, туши на минимальном огне 25-30 минут.","Смешай с варёными спагетти, подавай с пармезаном."], tip:"Чем дольше томится соус — тем богаче вкус. Если есть ещё 20 минут — не торопись." },
  { name:"Тако с говядиной", cuisine:"Мексиканская кухня", time:"30 минут", emoji:"🌮", description:"Сочная говядина с пряностями в хрустящей лепёшке, авокадо, сыром и сальсой. Яркий и весёлый ужин.", ingredients:["Говяжий фарш — 400 г","Лепёшки тортилья — 8 шт","Авокадо — 2 шт","Томаты — 2 шт","Лук красный — 0.5 шт","Твёрдый сыр — 100 г","Сметана — 150 г","Паприка, зира, чили — по 1 ч. л.","Кинза, лайм"], steps:["Обжарь фарш с луком 8 минут, разминая комки.","Добавь специи и чеснок, жарь 3 минуты.","Разомни авокадо с лаймом и солью — гуакамоле готов.","Томаты и красный лук нарежь — простая сальса.","Разогрей лепёшки и собери тако: мясо, гуакамоле, сальса, сыр, сметана."], tip:"Косточка авокадо в гуакамоле не даёт ему темнеть. И всегда добавляй лайм — он важнее всего." },
  { name:"Крем-суп из тыквы", cuisine:"Французская кухня", time:"40 минут", emoji:"🎃", description:"Бархатный нежный суп из тыквы с имбирём и кокосовым молоком. Сладковатый, ароматный и очень согревающий.", ingredients:["Тыква — 800 г","Лук — 1 шт","Имбирь свежий — 25 г","Кокосовое молоко — 200 мл","Овощной бульон — 400 мл","Чеснок — 2 зубчика","Оливковое масло","Тыквенные семечки для подачи","Соль, мускатный орех"], steps:["Тыкву очисти, нарежь. Обжарь с луком на масле 5 минут.","Добавь имбирь и чеснок, жарь 2 минуты.","Влей бульон, вари 20 минут до мягкости.","Пробей блендером. Влей кокосовое молоко, добавь специи.","Прогрей 3 минуты. Подавай со сливками и семечками."], tip:"Для более глубокого вкуса запеки тыкву с луком в духовке 20 минут перед варкой." },
  { name:"Лосось в медово-соевой глазури", cuisine:"Азиатская фьюжн", time:"20 минут", emoji:"🐟", description:"Нежнейший лосось в карамельной глазури с азиатскими нотами. Быстро, элегантно и невероятно вкусно.", ingredients:["Филе лосося — 2 порции (300 г)","Мёд — 2 ст. л.","Соевый соус — 3 ст. л.","Чеснок — 2 зубчика","Имбирь тёртый — 1 ч. л.","Сок лайма — 1 ст. л.","Кунжутное масло — 1 ч. л.","Кунжут и зелёный лук","Рис или овощи на гарнир"], steps:["Смешай мёд, соевый соус, чеснок, имбирь, лайм и кунжутное масло.","Лосось обсуши, залей маринадом на 10 минут.","Разогрей сковороду на сильном огне.","Жарь лосось кожей вниз 4 минуты, переверни. Влей маринад, жарь 3 минуты — глазурь карамелизуется.","Подавай с рисом, посыпав кунжутом и луком."], tip:"Не двигай лосось в первые 4 минуты — дай корочке образоваться. Тогда он сам легко отойдёт." },
  { name:"Плов узбекский", cuisine:"Узбекская кухня", time:"60 минут", emoji:"🍚", description:"Настоящий узбекский плов с бараниной, морковью и специями. Ароматный, сытный и торжественный.", ingredients:["Баранина или говядина — 400 г","Рис длиннозёрный — 300 г","Морковь — 2 шт","Лук — 2 шт","Чеснок — 1 головка","Растительное масло — 80 мл","Зира — 1 ч. л., куркума — 0.5 ч. л.","Соль, перец, барбарис"], steps:["Рис промой и замочи на 20 минут. Мясо нарежь кубиками, морковь — соломкой, лук — полукольцами.","Разогрей масло, обжарь лук до тёмно-золотистого цвета.","Добавь мясо, жарь 8 минут. Добавь морковь, ещё 5 минут.","Влей 600 мл кипятка, добавь специи и чеснок. Туши 15 минут.","Всыпь рис, не перемешивай. Вари без крышки, затем накрой и томи 20 минут."], tip:"Главный секрет плова — не мешать рис после закладки. Пусть готовится сам." },
  { name:"Бёф Строганов", cuisine:"Русская кухня", time:"35 минут", emoji:"🥩", description:"Нежная говядина в сметанном соусе с горчицей и грибами. Классика русской кухни, которая всегда кстати.", ingredients:["Говяжья вырезка — 500 г","Шампиньоны — 200 г","Лук — 2 шт","Сметана 20% — 200 г","Горчица дижонская — 1 ст. л.","Говяжий бульон — 100 мл","Томатная паста — 1 ч. л.","Масло сливочное и растительное"], steps:["Мясо нарежь тонкой соломкой поперёк волокон.","Обжарь лук, добавь грибы, жарь 7 минут. Отложи.","На сильном огне быстро обжарь мясо партиями 2-3 минуты.","Верни лук с грибами, добавь пасту, горчицу и бульон. Туши 3 минуты.","Убавь огонь, добавь сметану, прогрей 2 минуты. Подавай с гречкой."], tip:"Мясо жарят быстро и горячо — строганов не тушат долго, лишь прогревают в соусе." },
  { name:"Фо Бо", cuisine:"Вьетнамская кухня", time:"45 минут", emoji:"🥣", description:"Знаменитый вьетнамский говяжий суп с рисовой лапшой, звёздчатым анисом и свежими травами.", ingredients:["Говяжий бульон — 1 л","Рисовая лапша — 150 г","Говядина тонкий край (сырая) — 200 г","Имбирь — 30 г","Звёздчатый анис — 2 звёздочки","Корица — 1 палочка","Рыбный соус — 2 ст. л.","Ростки маша, кинза, лайм, чили"], steps:["Имбирь обжарь на сухой сковороде до подпалин. Добавь в бульон с анисом, корицей и соусом.","Вари бульон 25 минут, процеди.","Рисовую лапшу запари кипятком 5-8 минут, промой.","Говядину нарежь тончайшими слайсами.","В миску положи лапшу, сырую говядину, залей кипящим бульоном. Подавай с ростками и лаймом."], tip:"Говядину режут сырой и очень тонко — кипящий бульон моментально доводит её до готовности в тарелке." },
  { name:"Панна Котта с клубникой", cuisine:"Итальянская кухня", time:"20 мин (+ охлаждение)", emoji:"🍮", description:"Нежнейший итальянский десерт-пудинг из сливок с ванилью и ягодным соусом. Элегантно и безотказно вкусно.", ingredients:["Сливки 33% — 500 мл","Сахар — 60 г","Ваниль — 1 ч. л.","Желатин листовой — 10 г","Клубника — 300 г","Сахарная пудра — 2 ст. л.","Сок лимона — 1 ст. л."], steps:["Желатин замочи в холодной воде на 5 минут.","Сливки с сахаром и ванилью прогрей до горячего (не кипяти). Добавь желатин, раствори.","Разлей по стаканам, накрой и убери в холодильник на 3 часа.","Клубнику пробей блендером с пудрой и лимоном.","Подавай с клубничным соусом и целыми ягодами."], tip:"Идеальная панна котта дрожит как желе, но не расплывается. Передержанный желатин даст резину." },
  { name:"Мусака", cuisine:"Греческая кухня", time:"55 минут", emoji:"🫙", description:"Греческая запеканка с баклажанами, ароматным мясным соусом и нежным бешамелем. Сытная и согревающая.", ingredients:["Баклажан — 2 шт","Говяжий или бараний фарш — 400 г","Томаты консервированные — 300 г","Лук — 1 шт, чеснок — 2 зубчика","Корица — 0.5 ч. л., орегано — 1 ч. л.","Молоко — 300 мл, мука — 2 ст. л.","Сливочное масло — 30 г","Яйцо — 1 шт, пармезан — 50 г"], steps:["Баклажаны нарежь кружками, посоли, промой, обжарь до золотистости.","Обжарь лук и чеснок, добавь фарш, жарь 7 минут. Добавь томаты, корицу, орегано, туши 15 минут.","Для бешамеля растопи масло, добавь муку, влей молоко помешивая. Вбей яйцо.","В форме выложи: баклажаны, мясной соус, баклажаны. Залей бешамелем, посыпь пармезаном.","Запекай 25 минут при 200°C. Дай постоять 5 минут."], tip:"Корица в мясном соусе — не ошибка, это греческий секрет. Именно она даёт мусаке неповторимый аромат." },

];

// ── STATE ──
let currentMode = null;
const usedR = [], usedRec = [];

function getRandom(arr, used) {
  if (used.length >= arr.length) used.length = 0;
  let idx;
  do { idx = Math.floor(Math.random() * arr.length); } while (used.includes(idx));
  used.push(idx);
  return arr[idx];
}

function choose(mode) { currentMode = mode; showResult(mode); }
function shuffle() { showResult(currentMode); }

function goBack() {
  document.getElementById('resultScreen').classList.remove('visible');
  document.getElementById('choiceScreen').style.display = 'flex';
  document.getElementById('header').style.display = 'block';
}

function showResult(mode) {
  document.getElementById('choiceScreen').style.display = 'none';
  document.getElementById('header').style.display = 'none';
  const d = mode === 'restaurant' ? getRandom(RESTAURANTS, usedR) : getRandom(RECIPES, usedRec);
  renderResult(mode, d);
  document.getElementById('resultScreen').classList.add('visible');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function starsHtml(r) {
  const n = parseFloat(r), f = Math.floor(n), h = n % 1 >= 0.5 ? 1 : 0;
  return '★'.repeat(f) + (h ? '½' : '') + '☆'.repeat(5 - f - h);
}

function renderResult(mode, d) {
  const card = document.getElementById('resultCard');
  if (mode === 'restaurant') {
    card.innerHTML = `
      <div class="result-top">
        <div class="result-deco">${d.emoji}</div>
        <div class="result-type-label">Ресторан вечера</div>
        <div class="result-title">${d.name}</div>
        <div class="result-subtitle">${d.cuisine}</div>
      </div>
      <div class="result-body">
        <span class="cuisine-badge">${d.vibe}</span>
        <div class="result-section">
          <div class="rating-row"><span class="stars">${starsHtml(d.rating)}</span><span>${d.rating} из 5</span></div>
          <div class="divider"></div>
          <div class="address-row"><span class="address-pin">📍</span><span>${d.address}</span></div>
        </div>
        <div class="result-section">
          <div class="result-section-title">Почему именно здесь</div>
          <div class="result-section-body">${d.why}</div>
        </div>
        <div class="result-section">
          <div class="tag-list">${d.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
        </div>
      </div>`;
    document.getElementById('shuffleBtn').textContent = '✨ Другой ресторан';
  } else {
    card.innerHTML = `
      <div class="result-top">
        <div class="result-deco">${d.emoji}</div>
        <div class="result-type-label">Рецепт вечера</div>
        <div class="result-title">${d.name}</div>
        <div class="result-subtitle">${d.cuisine}</div>
      </div>
      <div class="result-body">
        <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;">
          <span class="cuisine-badge">${d.cuisine}</span>
          <span class="time-badge">⏱ ${d.time}</span>
        </div>
        <div class="result-section"><div class="result-section-body">${d.description}</div></div>
        <div class="divider"></div>
        <div class="result-section">
          <div class="result-section-title">Купить в магазине</div>
          <ul class="ingredient-list">${d.ingredients.map(i=>`<li>${i}</li>`).join('')}</ul>
        </div>
        <div class="divider"></div>
        <div class="result-section">
          <div class="result-section-title">Как готовить</div>
          <ul class="steps-list">${d.steps.map((s,i)=>`<li><span class="step-num">${i+1}</span><span>${s}</span></li>`).join('')}</ul>
        </div>
        ${d.tip ? `<div class="divider"></div><div class="result-section"><div class="result-section-title">Совет шеф-повара</div><div class="result-section-body" style="font-style:italic;">💡 ${d.tip}</div></div>` : ''}
      </div>`;
    document.getElementById('shuffleBtn').textContent = '✨ Другой рецепт';
  }
}
</script>
